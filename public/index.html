<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konvert</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#7c6af7', hover: '#6a58e0' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- Topbar -->
  <header class="flex items-center px-6 py-4 border-b border-white/10">
    <span class="text-xl font-medium text-violet-400">kon<span class="text-white">vert</span></span>
    <span class="ml-3 text-xs text-gray-500">local · private · instant</span>
    <div class="ml-auto flex items-center gap-3">
      <button onclick="toggleTheme()"
        class="text-sm px-4 py-1.5 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition">
        🌙 <span id="theme-label">Light mode</span>
      </button>
    </div>
  </header>

  <main class="flex flex-1">

    <!-- Sidebar -->
    <aside class="w-48 border-r border-white/10 p-4 flex flex-col gap-1">
      <p class="text-xs text-gray-500 uppercase tracking-widest px-2 mb-2">Format</p>
      <button onclick="setCategory('image', this)" class="cat-btn active-cat" data-cat="image">🖼 Images</button>
      <button onclick="setCategory('video', this)" class="cat-btn" data-cat="video">🎬 Video</button>
      <button onclick="setCategory('audio', this)" class="cat-btn" data-cat="audio">🎵 Audio</button>
      <button onclick="setCategory('document', this)" class="cat-btn" data-cat="document">📄 Documents</button>

      <div class="border-t border-white/10 my-3"></div>
      <p class="text-xs text-gray-500 uppercase tracking-widest px-2 mb-2">Recent</p>
      <div id="history" class="flex flex-col gap-1 text-xs text-gray-500">
        <span class="px-2 py-1">No conversions yet</span>
      </div>
    </aside>

    <!-- Content -->
    <section class="flex-1 p-8 flex flex-col gap-6">

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white/5 rounded-xl p-4 border border-white/10">
          <p class="text-xs text-gray-500 mb-1">Converted</p>
          <p class="text-2xl font-medium text-violet-400" id="stat-count">0</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10">
          <p class="text-xs text-gray-500 mb-1">Data kept local</p>
          <p class="text-2xl font-medium text-emerald-400">100%</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10">
          <p class="text-xs text-gray-500 mb-1">Uploaded to web</p>
          <p class="text-2xl font-medium text-emerald-400">0</p>
        </div>
      </div>

      <!-- Drop zone -->
      <div id="drop-zone"
        onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault(); this.classList.add('border-violet-500')"
        ondragleave="this.classList.remove('border-violet-500')"
        ondrop="handleDrop(event)"
        class="border-2 border-dashed border-white/20 rounded-2xl p-16 text-center cursor-pointer hover:border-violet-500 hover:bg-white/5 transition flex flex-col items-center gap-3">
        <div class="text-5xl">📂</div>
        <p class="text-lg font-medium">Drop your file here</p>
        <p class="text-sm text-gray-500">or <span class="text-violet-400 underline">browse files</span> — never leaves your machine</p>
        <input type="file" id="file-input" class="hidden" onchange="handleFile(this.files[0])">
      </div>

      <!-- Convert panel (hidden until file selected) -->
      <div id="convert-panel" class="hidden bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col gap-5">

        <!-- File info -->
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-violet-500/20 border border-violet-500/30 flex items-center justify-center text-2xl" id="file-icon">📄</div>
          <div>
            <p class="font-medium" id="fname">file.png</p>
            <p class="text-sm text-gray-500" id="fmeta">—</p>
          </div>
          <button onclick="resetUI()" class="ml-auto text-gray-500 hover:text-red-400 transition text-xl">✕</button>
        </div>

        <!-- Format picker -->
        <div>
          <p class="text-sm text-gray-500 mb-3">Convert to:</p>
          <div id="fmt-grid" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Progress -->
        <div id="progress-wrap" class="hidden flex-col gap-2">
          <div class="w-full bg-white/10 rounded-full h-1.5">
            <div id="progress-bar" class="bg-violet-500 h-1.5 rounded-full transition-all" style="width:0%"></div>
          </div>
          <div class="flex justify-between text-xs text-gray-500">
            <span id="progress-label">Converting...</span>
            <span id="progress-pct">0%</span>
          </div>
        </div>

        <!-- Done -->
        <div id="done-bar" class="hidden items-center gap-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-4">
          <span class="text-2xl">✅</span>
          <div class="flex-1">
            <p class="font-medium text-emerald-400" id="done-name">output.webp</p>
            <p class="text-sm text-gray-500">Converted successfully</p>
          </div>
          <a id="dl-link" href="#" download
            class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm transition">
            Download
          </a>
        </div>

        <!-- Convert button -->
        <button id="convert-btn" onclick="submitConvert()"
          class="w-full py-3 bg-violet-600 hover:bg-violet-700 active:scale-95 text-white rounded-xl font-medium transition">
          ⚡ Convert now
        </button>

      </div>
    </section>
  </main>

  <style>
    .cat-btn {
      text-align: left;
      padding: 0.5rem 0.75rem; /* py-2 px-3 */
      border-radius: 0.5rem; /* rounded-lg */
      font-size: 0.875rem; /* text-sm */
      color: #9CA3AF; /* text-gray-400 */
      width: 100%;
      transition: background-color .15s ease, color .15s ease, transform .15s ease;
    }
    .cat-btn:hover {
      background-color: rgba(255,255,255,0.05); /* hover:bg-white/5 */
      color: #ffffff; /* hover:text-white */
    }
    .active-cat {
      background-color: rgba(255,255,255,0.1); /* bg-white/10 */
      color: #8B5CF6; /* text-violet-400 */
    }
    .fmt-btn {
      padding: 0.375rem 1rem; /* py-1.5 px-4 */
      border-radius: 0.5rem; /* rounded-lg */
      border: 1px solid rgba(255,255,255,0.1); /* border-white/10 */
      background-color: rgba(255,255,255,0.05); /* bg-white/5 */
      font-size: 0.875rem; /* text-sm */
      color: #9CA3AF; /* text-gray-400 */
      cursor: pointer;
      transition: border-color .15s ease, color .15s ease, background-color .15s ease;
    }
    .fmt-btn:hover {
      border-color: #7C3AED; /* hover:border-violet-500 */
      color: #ffffff; /* hover:text-white */
    }
    .fmt-btn.selected {
      background-color: #6D28D9; /* bg-violet-600 */
      border-color: #6D28D9; /* border-violet-600 */
      color: #ffffff; /* text-white */
    }
  </style>

  <script>
    const formats = {
      image:    ['webp','png','jpg','avif','gif','bmp','tiff'],
      video:    ['mp4','mkv','webm','avi','mov'],
      audio:    ['mp3','wav','flac','ogg','aac','m4a'],
      document: ['pdf','docx','txt','html','md']
    }
    const icons = { image:'🖼', video:'🎬', audio:'🎵', document:'📄' }
    let currentCat = 'image', selectedFmt = null, currentFile = null, isDark = true

    function toggleTheme() {
      isDark = !isDark
      document.documentElement.classList.toggle('dark', isDark)
      document.getElementById('theme-label').textContent = isDark ? 'Light mode' : 'Dark mode'
      document.body.className = isDark
        ? 'bg-gray-950 text-gray-100 min-h-screen flex flex-col'
        : 'bg-gray-100 text-gray-900 min-h-screen flex flex-col'
    }

    function setCategory(cat, btn) {
      currentCat = cat
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'))
      btn.classList.add('active-cat')
    }

    function handleDrop(e) {
      e.preventDefault()
      document.getElementById('drop-zone').classList.remove('border-violet-500')
      handleFile(e.dataTransfer.files[0])
    }

    function handleFile(file) {
      if (!file) return
      currentFile = file
      const ext = file.name.split('.').pop().toLowerCase()
      let cat = 'document'
      if (['png','jpg','jpeg','gif','webp','bmp','tiff','avif'].includes(ext)) cat = 'image'
      else if (['mp4','mkv','avi','mov','webm'].includes(ext)) cat = 'video'
      else if (['mp3','wav','flac','ogg','aac','m4a'].includes(ext)) cat = 'audio'

      currentCat = cat
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'))
      document.querySelector(`[data-cat="${cat}"]`).classList.add('active-cat')

      document.getElementById('file-icon').textContent = icons[cat]
      document.getElementById('fname').textContent = file.name
      document.getElementById('fmeta').textContent = `${(file.size / 1048576).toFixed(2)} MB · ${cat}`

      buildFormats(cat, ext)
      document.getElementById('drop-zone').classList.add('hidden')
      document.getElementById('convert-panel').classList.remove('hidden')
      document.getElementById('progress-wrap').classList.add('hidden')
      document.getElementById('done-bar').classList.add('hidden')
      document.getElementById('convert-btn').classList.remove('hidden')
      document.getElementById('progress-bar').style.width = '0%'
    }

    function buildFormats(cat, srcExt) {
      const grid = document.getElementById('fmt-grid')
      grid.innerHTML = ''
      selectedFmt = null
      formats[cat].forEach(f => {
        if (f === srcExt) return
        const btn = document.createElement('button')
        btn.className = 'fmt-btn'
        btn.textContent = f
        btn.onclick = () => {
          document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('selected'))
          btn.classList.add('selected')
          selectedFmt = f
        }
        grid.appendChild(btn)
      })
      if (grid.children.length) grid.children[0].click()
    }

    function submitConvert() {
      if (!selectedFmt || !currentFile) return
      const formData = new FormData()
      formData.append('file', currentFile)
      formData.append('format', selectedFmt)

      document.getElementById('convert-btn').classList.add('hidden')
      document.getElementById('progress-wrap').classList.remove('hidden')
      document.getElementById('done-bar').classList.add('hidden')

      // Animate progress bar while waiting for server
      let p = 0
      const steps = ['Reading file...', 'Processing...', 'Encoding...', 'Finalizing...']
      const iv = setInterval(() => {
        p = Math.min(p + Math.random() * 8 + 3, 90)
        document.getElementById('progress-bar').style.width = p + '%'
        document.getElementById('progress-pct').textContent = Math.round(p) + '%'
        document.getElementById('progress-label').textContent = steps[Math.min(Math.floor(p / 25), 3)]
      }, 200)

      fetch('/convert', { method: 'POST', body: formData })
        .then(res => {
          if (!res.ok) throw new Error('Conversion failed')
          return res.blob()
        })
        .then(blob => {
          clearInterval(iv)
          document.getElementById('progress-bar').style.width = '100%'
          document.getElementById('progress-pct').textContent = '100%'
          setTimeout(() => showDone(blob), 300)
        })
        .catch(err => {
          clearInterval(iv)
          alert('Error: ' + err.message)
          resetUI()
        })
    }

    function showDone(blob) {
      const base = currentFile.name.replace(/\.[^.]+$/, '')
      const outName = `${base}.${selectedFmt}`
      const url = URL.createObjectURL(blob)
      document.getElementById('dl-link').href = url
      document.getElementById('dl-link').download = outName
      document.getElementById('done-name').textContent = outName
      document.getElementById('progress-wrap').classList.add('hidden')
      document.getElementById('done-bar').classList.remove('hidden')

      // Update stats and history
      const count = document.getElementById('stat-count')
      count.textContent = parseInt(count.textContent) + 1
      addHistory(currentFile.name, selectedFmt)
    }

    function addHistory(fname, fmt) {
      const hist = document.getElementById('history')
      if (hist.children.length === 1 && hist.children[0].tagName === 'SPAN') hist.innerHTML = ''
      const item = document.createElement('div')
      item.className = 'px-2 py-1 rounded-lg text-xs text-gray-400 truncate'
      item.textContent = `${fname} → ${fmt}`
      hist.prepend(item)
    }

    function resetUI() {
      currentFile = null
      document.getElementById('convert-panel').classList.add('hidden')
      document.getElementById('drop-zone').classList.remove('hidden')
      document.getElementById('file-input').value = ''
    }
  </script>

</body>
</html>
